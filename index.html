<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Balsa Mejana</title>
    <!-- Usamos la versión estable 1.0.3 que es muy fiable para WebSockets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --primary: #2b6cb0; --bg: #f7fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 30px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .balsa-frame { width: 140px; height: 200px; border: 6px solid #4a5568; border-radius: 10px 10px 30px 30px; margin: 0 auto 20px; position: relative; overflow: hidden; background: #edf2f7; }
        .water-level { position: absolute; bottom: 0; width: 100%; background: linear-gradient(180deg, #63b3ed 0%, var(--primary) 100%); transition: height 2s ease; height: 0%; }
        .percent-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: 900; z-index: 5; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .data-card { background: #f8fafc; padding: 12px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .data-label { font-size: 0.7rem; color: #a0aec0; text-transform: uppercase; font-weight: bold; }
        .data-value { display: block; font-size: 1.2rem; font-weight: 700; margin-top: 4px; }
        #status { margin-top: 25px; font-size: 0.75rem; padding: 10px; border-radius: 12px; font-weight: 700; }
        .online { background: #c6f6d5; color: #22543d; }
        .offline { background: #fed7d7; color: #822727; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary); margin:0;">Balsa Mejana</h2>
    <p style="color: #718096; margin-bottom: 20px;">Monitoreo en Tiempo Real</p>

    <div class="balsa-frame">
        <div id="waterLayer" class="water-level"></div>
        <div id="txtPercent" class="percent-text">--%</div>
    </div>

    <div class="data-grid">
        <div class="data-card"><span class="data-label">Distancia</span><span id="txtDist" class="data-value">-- mm</span></div>
        <div class="data-card"><span class="data-label">Batería</span><span id="txtBat" class="data-value">-- V</span></div>
    </div>

    <div id="status" class="offline">Iniciando conexión...</div>
</div>

<script>
    const DIST_VACIO = 1300; 
    const DIST_LLENO = 300;  

    // Configuración TTN
    const USER = "nivel-balsa-dragino@ttn";
    const PASS = "NNSXS.G24SW52K5CR2BH6VPJUIZQOYR6NH6OYLA57BPZQ.UKQEMVEUEH6OGMIEC65IOQX2QP522LL6MTSD76BZ5CX6LKK7JLRQ";
    const DEV_ID = "lssd75-nivel-balsa";

    // Intentamos la conexión sin especificar puerto en el host para que el socket lo gestione solo
    const client = new Paho.MQTT.Client("eu1.cloud.thethings.network", 443, "/mqtt", "web_" + Math.random().toString(16).slice(2, 8));

    client.onMessageArrived = (message) => {
        const payload = JSON.parse(message.payloadString).uplink_message.decoded_payload;
        const dist = parseInt(payload.Distance || payload.distance || 0);
        const bat = payload.Bat || payload.vbat || 0;

        if (dist > 0) {
            let pct = Math.max(0, Math.min(100, ((DIST_VACIO - dist) / (DIST_VACIO - DIST_LLENO)) * 100));
            document.getElementById('waterLayer').style.height = pct + "%";
            document.getElementById('txtPercent').innerText = Math.round(pct) + "%";
            document.getElementById('txtDist').innerText = dist + " mm";
            document.getElementById('txtBat').innerText = bat + " V";
        }
    };

    client.onConnectionLost = () => {
        document.getElementById('status').innerText = "Conexión perdida";
        document.getElementById('status').className = "offline";
    };

    client.connect({
        userName: USER,
        password: PASS,
        useSSL: true,
        onSuccess: () => {
            document.getElementById('status').innerText = "● Conectado Online";
            document.getElementById('status').className = "online";
            client.subscribe(`v3/${USER}/devices/${DEV_ID}/up`);
        },
        onFailure: (err) => {
            document.getElementById('status').innerText = "Error: " + err.errorMessage;
            console.error(err);
        }
    });
</script>
</body>
</html>
